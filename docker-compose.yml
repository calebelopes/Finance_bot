services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - DASHBOARD_URL=${DASHBOARD_URL:-http://localhost:8000}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    environment:
      - DB_PATH=/app/data/data.db
      - WEB_PORT=8000
    volumes:
      - ./data:/app/data
    restart: unless-stopped
